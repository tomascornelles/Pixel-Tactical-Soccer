<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pixel Soccer</title>
    
    <link rel="icon" type="image/png" href="favicon.png">

    <link rel="manifest" href="manifest.json">

    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Pixel Soccer">
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bitcount+Grid+Double:wght@100..900&family=Bitcount+Single:wght@100..900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --pixel-size: 4px;
            --bg-color: #181425;
            --field-green: #38b764;
            --field-dark: #257142;
            --pixel-white: #ffffff;
            --pixel-black: #000000;
            --font-text: 'Bitcount Single', monospace;
            --font-title: 'Bitcount Grid Double', sans-serif;
        }

        * {
            box-sizing: border-box;
            image-rendering: pixelated;
        }

        body {
            background-color: var(--bg-color);
            color: var(--pixel-white);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            font-family: var(--font-text);
            font-size: 20px; 
            font-weight: 500;
            min-height: 100vh;
        }

        h2 {
            font-family: var(--font-title) !important;
            font-weight: 700;
            font-size: 24px; 
            letter-spacing: 0.5px;
            margin-top: 10px;
            margin-bottom: 25px;
            text-align: center;
        }

        h3 {
            font-family: var(--font-title) !important;
            font-weight: 700;
            font-size: 18px; 
            letter-spacing: 0.5px;
            margin-top: 5px;
            margin-bottom: 15px;
        }

        .main-wrapper {
            width: 100%;
            max-width: 500px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .pixel-box {
            border: 4px solid var(--pixel-white);
            background: #262b44;
            padding: 15px;
            box-shadow: 0 6px 0 var(--pixel-black);
            margin-bottom: 15px;
            width: 100%;
        }

        .pixel-btn {
            font-family: var(--font-text);
            font-size: 16px;
            font-weight: 600;
            background: #e4a672;
            border: 4px solid var(--pixel-white);
            color: var(--pixel-black);
            padding: 6px;
            cursor: pointer;
            margin: 5px;
            display: inline-block;
            box-shadow: 0 4px 0 var(--pixel-black);
        }

        .pixel-btn:active {
            transform: translateY(2px);
            box-shadow: 0 2px 0 var(--pixel-black);
        }

        .pixel-btn:disabled {
            background: #a2a2a2 !important;
            color: #555 !important;
            cursor: not-allowed;
            transform: none !important;
            box-shadow: 0 4px 0 var(--pixel-black) !important;
        }

        .setup-split-container {
            display: flex;
            gap: 15px;
            align-items: center;
            margin-bottom: 20px;
            width: 100%;
        }

        .setup-preview-side {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            background: #1d2136;
            border: 3px dashed #fff;
            height: 195px;
        }

        .setup-selectors-side {
            flex: 2;
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .slots-container {
            display: flex;
            justify-content: space-between;
            width: 100%;
            margin-bottom: 15px;
        }

        .slot-tab {
            font-family: var(--font-title) !important;
            font-weight: 700;
            font-size: 20px; 
            background: #3a4466;
            border: 4px solid var(--pixel-white); 
            padding: 10px 2px; 
            flex: 1;
            text-align: center;
            margin: 0 3px;
            cursor: pointer; 
            user-select: none;
            color: var(--pixel-white);
            box-shadow: 0 3px 0 var(--pixel-black);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
        }

        .slot-tab.active {
            background: #f4b41b;
            color: var(--pixel-black);
        }

        .slot-tab.disabled {
            background: #24283d;
            color: #555;
            border-color: #555;
            box-shadow: 0 3px 0 var(--pixel-black);
            cursor: not-allowed;
            opacity: 0.6;
        }

        .tab-star {
            font-size: 19px;
            color: #7d87a4;
            cursor: pointer;
            transition: transform 0.1s ease;
        }

        .slot-tab.active .tab-star {
            color: black;
            font-size: 1.3em;
        }

        #soccer-field {
            width: 100%;
            height: 340px;
            background: repeating-linear-gradient(to bottom, var(--field-green), var(--field-green) 30px, var(--field-dark) 30px, var(--field-dark) 60px);
            border: 6px solid var(--pixel-white);
            box-shadow: 0 8px 0 var(--pixel-black);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 15px;
            position: relative;
            overflow: hidden;
        }

        .field-line {
            position: absolute;
            width: 100%;
            height: 4px;
            background: rgba(255, 255, 255, 0.3);
            top: 50%;
            left: 0;
            transform: translateY(-50%);
        }

        .field-row {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 12px;
            min-height: 55px;
            z-index: 2;
        }

        .player-pixel {
            width: 34px;
            height: 36px;
            border: 2px solid var(--pixel-white);
            display: flex;
            flex-direction: column;
            position: relative;
            box-shadow: 0 3px 0 var(--pixel-black);
            cursor: pointer;
            overflow: hidden;
        }

        .player-pixel.mini {
            width: 18px;
            height: 20px;
            border: 1px solid var(--pixel-white);
            box-shadow: 0 1px 0 var(--pixel-black);
            display: inline-flex;
            cursor: default;
        }

        .jersey-zone {
            flex: 1.5; 
            width: 100%;
        }

        .shorts-zone {
            flex: 0.5; 
            width: 100%;
            border-top: 1px solid rgba(255,255,255,0.2);
        }

        .color-picker-select {
            font-family: var(--font-text);
            width: 100%;
            height: 38px;
            cursor: pointer;
            font-size: 0px; 
            color: transparent;
            text-shadow: 0 0 0 transparent;
        }

        .pattern-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            margin-top: 5px;
            margin-bottom: 15px;
        }

        .pattern-opt {
            border: 3px solid white;
            height: 50px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #3a4466;
            position: relative;
        }

        .pattern-opt.selected {
            border-color: #f4b41b;
            background: #4d5880;
        }

        .pattern-preview {
            width: 30px;
            height: 30px;
            border: 1px solid #fff;
        }

        .screen { display: none; width: 100%; }
        .screen.active { display: block; }

        input[type="text"], select {
            font-family: var(--font-text);
            background: #181425;
            border: 3px solid var(--pixel-white);
            color: var(--pixel-white);
            padding: 4px 8px;
            font-size: 19px;
            width: 100%;
            margin-top: 5px;
        }

        .input-inline-container {
            display: flex;
            gap: 5px;
            align-items: center;
            margin-top: 5px;
            width: 100%;
        }

        .pixel-input-matching {
            background: #181425;
            border: 4px solid var(--pixel-white) !important;
            color: var(--pixel-white);
            padding: 6px 10px !important;
            font-size: 19px;
            flex: 1;
            margin: 0 !important;
            height: 38px; 
            box-shadow: 0 4px 0 var(--pixel-black);
        }

        .vs-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 15px 0;
            text-align: center;
            gap: 10px;
        }

        .vs-team-box {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            max-width: 42%;
        }

        .vs-team-name {
            font-size: 19px;
            word-break: break-word;
            line-height: 1.3;
        }

        .vs-score-center {
            font-family: var(--font-title) !important;
            font-weight: 700;
            font-size: 34px; 
            color: #f4b41b;
            white-space: nowrap;
            margin-bottom: 0;
        }

        #resultado-lista {
            list-style: none;
            padding: 0;
            line-height: 1.8;
        }
        #resultado-lista li {
            margin-bottom: 8px;
            padding: 8px;
            border-bottom: 1px dashed #555;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .footer-controls-section {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: 5px;
            margin-bottom: 25px;
        }

        .footer-buttons-row {
            display: flex;
            gap: 10px;
            justify-content: center;
            width: 100%;
        }

        .pixel-divider {
            width: 100%;
            height: 4px;
            background: repeating-linear-gradient(90deg, #fff, #fff 4px, transparent 4px, transparent 8px);
            margin-bottom: 15px;
        }

        .help-modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7);
            z-index: 100;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .help-modal.active {
            display: flex;
        }
        .help-content {
            max-width: 440px;
            max-height: 80vh;
            overflow-y: auto;
        }
        .help-content p, .help-content li {
            font-size: 18px;
            line-height: 1.4;
        }
    </style>
</head>
<body>

    <div class="main-wrapper">
        
        <div id="screen-setup" class="screen active pixel-box">
            <h2 id="lbl-config-equipo">CONFIGURAR EQUIPO</h2>
            
            <label id="lbl-nombre-equipo">Nombre del Equipo:</label>
            <div class="input-inline-container" style="margin-bottom: 15px;">
                <input type="text" id="input-team-name" class="pixel-input-matching" value="Pixel FC" oninput="guardarEnLocalStorageDinamico()">
                <button class="pixel-btn" id="btn-random-kit" style="margin:0; height: 38px; width: 44px; padding: 0; background: #41a6f6; color: white; font-size: 18px; display: flex; align-items: center; justify-content: center;" onclick="aplicarCombinacionAleatoria()">🎲</button>
            </div>

            <div class="setup-split-container">
                <div class="setup-preview-side">
                    <div class="player-pixel" id="jersey-preview" style="transform: scale(1.8); cursor: default;">
                        <div class="jersey-zone" id="preview-jersey-layer"></div>
                        <div class="shorts-zone" id="preview-shorts-layer"></div>
                    </div>
                </div>

                <div class="setup-selectors-side">
                    <div>
                        <label id="lbl-color1" style="font-size:15px;">Color Principal:</label>
                        <input type="color" id="select-color1" class="color-picker-select" onchange="actualizarColoresDesdeSelect()"></select>
                    </div>
                    <div style="margin-top: 4px;">
                        <label id="lbl-color2" style="font-size:15px;">Color Secundario:</label>
                        <input type="color" id="select-color2" class="color-picker-select" onchange="actualizarColoresDesdeSelect()"></select>
                    </div>
                    <div style="margin-top: 4px;">
                        <label id="lbl-color-pants" style="font-size:15px;">Pantalón:</label>
                        <input type="color" id="select-color-pants" class="color-picker-select" onchange="actualizarColoresDesdeSelect()"></select>
                    </div>
                </div>
            </div>
            
            <label id="lbl-patron">Patrón de Camiseta:</label>
            <div class="pattern-grid" style="margin-bottom: 15px;">
                <div class="pattern-opt" id="p-solido" onclick="seleccionarPatron('solido')">
                    <div class="pattern-preview" style="background: #ffffff;"></div>
                </div>
                <div class="pattern-opt" id="p-rayas" onclick="seleccionarPatron('rayas')">
                    <div class="pattern-preview" style="background: repeating-linear-gradient(90deg, #ffffff, #ffffff 5px, #9b9b9b 5px, #9b9b9b 10px);"></div>
                </div>
                <div class="pattern-opt" id="p-mitad" onclick="seleccionarPatron('mitad')">
                    <div class="pattern-preview" style="background: linear-gradient(90deg, #ffffff 50%, #9b9b9b 50%);"></div>
                </div>
                <div class="pattern-opt" id="p-diagonal" onclick="seleccionarPatron('diagonal')">
                    <div class="pattern-preview" style="background: linear-gradient(135deg, #ffffff 50%, #9b9b9b 50%);"></div>
                </div>
            </div>

            <div class="pattern-grid">
                <div class="pattern-opt" id="p-h-lineas" onclick="seleccionarPatron('h-lineas')">
                    <div class="pattern-preview" style="background: repeating-linear-gradient(0deg, #ffffff, #ffffff 5px, #9b9b9b 5px, #9b9b9b 10px);"></div>
                </div>
                <div class="pattern-opt" id="p-linea-diagonal" onclick="seleccionarPatron('linea-diagonal')">
                    <div class="pattern-preview" style="background: linear-gradient(45deg, transparent 48%, #ffffff 48%, #ffffff 52%, transparent 52%);"></div>
                </div>
                <div class="pattern-opt" id="p-v-linea" onclick="seleccionarPatron('v-linea')">
                    <div class="pattern-preview" style="background: linear-gradient(90deg, transparent 48%, #ffffff 48%, #ffffff 52%, transparent 52%);"></div>
                </div>
                <div class="pattern-opt" id="p-damero" onclick="seleccionarPatron('damero')">
                    <div class="pattern-preview" style="background: repeating-conic-gradient(#ffffff 0deg 90deg, #9b9b9b 90deg 180deg) 0 0 / 10px 10px;"></div>
                </div>
            </div>

            <button class="pixel-btn" style="width:100%" onclick="guardarPerfil()" id="btn-comenzar">EMPEZAR DESAFÍO</button>
        </div>

        <div id="screen-tactics" class="screen">
            <div class="slots-container" id="slots-header">
                <div class="slot-tab active" id="tab-1" onclick="intentarCambiarPestana(1)">1 <span class="tab-star" id="star-tab-1" onclick="clickEstrellaTab(1, event)">☆</span></div>
                <div class="slot-tab" id="tab-2" onclick="intentarCambiarPestana(2)">2 <span class="tab-star" id="star-tab-2" onclick="clickEstrellaTab(2, event)">☆</span></div>
                <div class="slot-tab" id="tab-3" onclick="intentarCambiarPestana(3)">3 <span class="tab-star" id="star-tab-3" onclick="clickEstrellaTab(3, event)">☆</span></div>
                <div class="slot-tab" id="tab-4" onclick="intentarCambiarPestana(4)">4 <span class="tab-star" id="star-tab-4" onclick="clickEstrellaTab(4, event)">☆</span></div>
                <div class="slot-tab" id="tab-5" onclick="intentarCambiarPestana(5)">5 <span class="tab-star" id="star-tab-5" onclick="clickEstrellaTab(5, event)">☆</span></div>
                <div class="slot-tab" id="tab-6" onclick="intentarCambiarPestana(6)">6 <span class="tab-star" id="star-tab-6" onclick="clickEstrellaTab(6, event)">☆</span></div>
            </div>

            <p id="lbl-instruccion-campo" style="color: #cbd6e2; font-size: 16px; text-align: center; margin-bottom: 5px; margin-top:0;">
                [Click en un jugador para quitarlo]
            </p>

            <div id="soccer-field">
                <div class="field-line"></div>
                <div class="field-row" id="row-del"></div>
                <div class="field-row" id="row-med"></div>
                <div class="field-row" id="row-def"></div>
                <div class="field-row" id="row-por">
                    <div class="player-pixel" style="cursor: default;" id="gk-player">
                        <div class="jersey-zone" style="background: #41a6f6 !important;"></div>
                        <div class="shorts-zone" style="background: #ffffff !important; flex: 0.5;"></div>
                    </div>
                </div>
            </div>

            <div class="pixel-box" style="margin-top:15px; text-align:center;">
                <div id="panel-creacion">
                    <p id="lbl-anyadir">Añadir Jugadores (Max 10):</p>
                    <button class="pixel-btn" id="btn-add-def" onclick="anyadirJugador('def')">DEF +1</button>
                    <button class="pixel-btn" id="btn-add-med" onclick="anyadirJugador('med')">MED +1</button>
                    <button class="pixel-btn" id="btn-add-del" onclick="anyadirJugador('del')">DEL +1</button>
                    <p id="lbl-info-cambios-contador" style="color:#f4b41b; margin: 10px 0 0 0; font-size: 17px; display:none;"></p>
                </div>

                <hr style="border: 2px solid white; margin: 15px 0;">
                <div style="display:flex; gap:10px;">
                    <button class="pixel-btn" id="btn-atras-slot" style="flex:1; background:#b13e53; color: white; display:none;" onclick="retrocederSlot()">⇦ ATRÁS</button>
                    <button class="pixel-btn" id="btn-accion-slot" style="flex:2; background:#38b764; color: white;" onclick="avanzarSlot()">SIGUIENTE ⇨</button>
                </div>
            </div>
        </div>

        <div id="screen-share" class="screen pixel-box" style="text-align:center;">
            <h2 id="lbl-listo">¡DESAFÍO LISTO!</h2>
            <p id="lbl-copiar-inst">Copia este enlace y envíaselo a tu rival:</p>
            <input type="text" id="share-link" readonly style="text-align:center; margin-bottom:15px;">
            <button class="pixel-btn" onclick="copiarEnlace()" id="btn-copiar">COPIAR ENLACE</button>
        </div>

        <div id="screen-result" class="screen pixel-box">
            <h2 style="text-align:center;" id="lbl-resumen">RESUMEN DEL PARTIDO</h2>
            
            <div class="vs-container" id="marcador-dinamico-equipos"></div>
            
            <hr style="border: 2px solid white;">
            
            <ul id="resultado-lista"></ul>
            
            <div id="panel-retorno-rival" style="display:none; text-align:center; margin: 15px 0; padding:10px; border:2px dashed #f4b41b;">
                <p id="lbl-retorno-inst" style="font-size: 16px;">¡Envía el resultado de vuelta al retador para que vea el desenlace!</p>
                <input type="text" id="share-back-link" readonly style="text-align:center; margin-bottom:10px;">
                <button class="pixel-btn" onclick="copiarEnlaceRetorno()" id="btn-copiar-retorno">COPIAR ENLACE RESULTADO</button>
            </div>

            <button class="pixel-btn" style="width:100%" onclick="irAInicio()" id="btn-nuevo">CREAR NUEVO DESAFÍO</button>
        </div>

        <div class="footer-controls-section">
            <div class="pixel-divider"></div>
            <div class="footer-buttons-row">
                <button class="pixel-btn" onclick="toggleIdioma()" id="btn-idioma">LANG: ES</button>
                <button class="pixel-btn" style="background:#f4b41b;" onclick="abrirAyuda()" id="btn-ayuda">¿COMO JUGAR? ❓</button>
            </div>
        </div>

    </div>

    <div class="help-modal" id="modal-ayuda" onclick="cerrarAyuda()">
        <div class="pixel-box help-content" onclick="event.stopPropagation()">
            <h2 id="modal-titulo-ayuda" style="margin-bottom:10px;">INSTRUCCIONES DE JUEGO</h2>
            <div id="modal-cuerpo-ayuda"></div>
            <br>
            <button class="pixel-btn" style="width:100%; margin:0;" onclick="cerrarAyuda()">OK</button>
        </div>
    </div>

        function refrescarEstrellasPestanasTodo() {
            for (let s = 1; s <= 6; s++) {
                const starElement = document.getElementById(`star-tab-${s}`);
                if (starElement) {
                    if (estrellaMarcada === s) {
                        starElement.classList.add('star-active');
                        starElement.innerText = "★";
                    } else {
                        starElement.classList.remove('star-active');
                        starElement.innerText = "☆";
                    }
                }
                
                const f = alineacionesPorSlot[slotActual];
                const tab = document.getElementById(`tab-${s}`);
                if (tab) {
                    if (f && calcularTotalJugadores(f) < 10 && s !== slotActual) {
                        tab.classList.add('disabled');
                    } else {
                        tab.classList.remove('disabled');
                    }
                }
            }
        }

        function clickEstrellaTab(num, event) {
            event.stopPropagation(); 
            const f = alineacionesPorSlot[slotActual];
            if (f && calcularTotalJugadores(f) < 10 && num !== slotActual) return; 

            if (estrellaMarcada === num) {
                estrellaMarcada = null;
            } else {
                estrellaMarcada = num;
            }
            refrescarEstrellasPestanasTodo();
        }

        function obtenerEstiloCamiseta(c1, c2, patron) {
            if (patron === 'rayas') {
                return `repeating-linear-gradient(90deg, ${c1}, ${c1} 6px, ${c2} 6px, ${c2} 12px)`;
            } else if (patron === 'mitad') {
                return `linear-gradient(90deg, ${c1} 50%, ${c2} 50%)`;
            } else if (patron === 'diagonal') {
                return `linear-gradient(135deg, ${c1} 50%, ${c2} 50%)`;
            } else if (patron === 'h-lineas') {
                return `repeating-linear-gradient(0deg, ${c1}, ${c1} 6px, ${c2} 6px, ${c2} 12px)`;
            } else if (patron === 'linea-diagonal') {
                return `linear-gradient(45deg, transparent 45%, ${c2} 45%, ${c2} 55%, transparent 55%), linear-gradient(to right, ${c1}, ${c1})`;
            } else if (patron === 'v-linea') {
                return `linear-gradient(90deg, transparent 45%, ${c2} 45%, ${c2} 55%, transparent 55%), linear-gradient(to bottom, ${c1}, ${c1})`;
            } else if (patron === 'damero') {
                return `repeating-conic-gradient(${c1} 0 25%, ${c2} 0 50%) 50% / 10px 10px`;
            }
            return `linear-gradient(0deg, transparent 90%, ${c2} 90%, ${c2} 100%, transparent 100%), linear-gradient(to bottom, ${c1}, ${c1})`;
        }

            inicializarIdioma();

        function guardarPerfil() {
            perfil.nombre = document.getElementById('input-team-name').value;
            guardarEnLocalStorageDinamico();
            document.getElementById('screen-setup').classList.remove('active');
            document.getElementById('screen-tactics').classList.add('active');
            dibujarCampo();
        }

        function obtenerNombreTactica(f, lang = idioma) {
            const d = diccionario[lang];
            if (f.def >= 5) return d.autobus;
            if (f.med >= 4) return d.posesion;
            return d.heavyMetal;
        }

        function calcularTotalJugadores(f) {
            return f.def + f.med + f.del;
        }

        function calcularCambiosTotalesDelPartido() {
            let cambiosTotales = 0;
            for (let s = 2; s <= 6; s++) {
                if (!alineacionesPorSlot[s]) break;
                let anterior = alineacionesPorSlot[s - 1];
                let actual = alineacionesPorSlot[s];
                
                let diff = Math.abs(actual.def - anterior.def) + 
                           Math.abs(actual.med - anterior.med) + 
                           Math.abs(actual.del - anterior.del);
                
                cambiosTotales += (diff / 2);
            }
            return cambiosTotales;
        }

        function dibujarCampo() {
            const f = alineacionesPorSlot[slotActual];
            const totalJ = calcularTotalJugadores(f);
            const cambiosGlobales = calcularCambiosTotalesDelPartido();

            const panelC = document.getElementById('panel-creacion');
            const btns = panelC.getElementsByTagName('button');
            const contadorEl = document.getElementById('lbl-info-cambios-contador');

            if (slotActual > 1) {
                contadorEl.style.display = 'block';
                contadorEl.innerText = `${diccionario[idioma].cambiosUsados} ${cambiosGlobales} / 3`;
            } else {
                contadorEl.style.display = 'none';
            }

            for(let b of btns) {
                b.disabled = (totalJ >= 10 || (slotActual > 1 && cambiosGlobales >= 3));
            }

            const faltanJugadores = (totalJ < 10);
            document.getElementById('btn-accion-slot').disabled = faltanJugadores;
            document.getElementById('btn-atras-slot').disabled = faltanJugadores;

            const crearFilaInteractiva = (containerId, cantidad, tipoPos) => {
                const contenedor = document.getElementById(containerId);
                contenedor.innerHTML = '';
                for(let i=0; i<cantidad; i++){
                    let div = document.createElement('div');
                    div.className = 'player-pixel';
                    
                    let jersey = document.createElement('div');
                    jersey.className = 'jersey-zone';
                    jersey.style.background = obtenerEstiloCamiseta(perfil.color1, perfil.color2, perfil.patron);
                    
                    let shorts = document.createElement('div');
                    shorts.className = 'shorts-zone';
                    shorts.style.background = perfil.colorPants;
                    
                    div.appendChild(jersey);
                    div.appendChild(shorts);
                    
                    div.onclick = () => {
                        if (alineacionesPorSlot[slotActual][tipoPos] > 1 && calcularCambiosTotalesDelPartido() < 2.5) {
                            alineacionesPorSlot[slotActual][tipoPos]--;
                            dibujarCampo();
                        }
                    };
                    
                    contenedor.appendChild(div);
                }
            };

            crearFilaInteractiva('row-del', f.del, 'del');
            crearFilaInteractiva('row-med', f.med, 'med');
            crearFilaInteractiva('row-def', f.def, 'def');
            
            refrescarEstrellasPestanasTodo();
        }

        function anyadirJugador(tipo) {
            const f = alineacionesPorSlot[slotActual];
            if (calcularTotalJugadores(f) < 10) {
                f[tipo]++;
                dibujarCampo();
            }
        }

        function intentarCambiarPestana(num) {
            const f = alineacionesPorSlot[slotActual];
            
            if (calcularTotalJugadores(f) < 10) {
                return;
            }
            
            if (slotActual === num) return;
            
            slotActual = num;

            document.querySelectorAll('.slot-tab').forEach((tab) => tab.classList.remove("active"));
            document.querySelector(`#tab-${num}`).classList.add("active");
            
            if (!alineacionesPorSlot[slotActual]) {
                let anterior = alineacionesPorSlot[slotActual - 1];
                alineacionesPorSlot[slotActual] = { def: anterior.def, med: anterior.med, del: anterior.del };
            }
            
            dibujarCampo();
        }

        function avanzarSlot() {
            const f = alineacionesPorSlot[slotActual];
            
            if (calcularTotalJugadores(f) < 10) {
                alert(diccionario[idioma].errorMin);
                return;
            }
            
            const cambiosGlobales = calcularCambiosTotalesDelPartido();
            if (slotActual > 1 && cambiosGlobales > 3) {
                alert(diccionario[idioma].errorCambios);
                return;
            }
            
            if (slotActual < 6) {
                intentarCambiarPestana(slotActual + 1);
                document.getElementById('btn-atras-slot').style.display = 'inline-block';
            } else {
                finalizarAlineacion();
            }
        }

        function retrocederSlot() {
            if (slotActual > 1) {
                intentarCambiarPestana(slotActual - 1);
                if (slotActual === 1) {
                    document.getElementById('btn-atras-slot').style.display = 'none';
                }
            }
        }

        function actualizarBotonAccion() {
            const btnAccion = document.getElementById('btn-accion-slot');
            if (!btnAccion) return;
            
            if (slotActual === 6) {
                btnAccion.innerText = modoRival ? diccionario[idioma].envReto : diccionario[idioma].envDesafio;
            } else {
                btnAccion.innerText = diccionario[idioma].sigSlot;
            }
        }

        function finalizarAlineacion() {
            document.getElementById('screen-tactics').classList.remove('active');
            
            if (!modoRival) {
                document.getElementById('screen-share').classList.add('active');
                crearYCompartirPartido();
            } else {
                simularPartido();
            }
        }

        async function crearYCompartirPartido() {
            const nuevoPartido = {
                creador: perfil.nombre,
                color1_creator: perfil.color1,
                color2_creator: perfil.color2,
                colorPants_creator: perfil.colorPants,
                patron_creator: perfil.patron,
                alineaciones_creator: JSON.stringify(alineacionesPorSlot),
                alineaciones_rival: null,
                resultado: null,
                rival_name: null,
                star_slot: estrellaMarcada
            };

            try {
                const { data, error } = await supabaseClient
                    .from('matches')
                    .insert([nuevoPartido])
                    .select();

                if (error) throw error;

                const matchId = data[0].id;
                const baseUrl = window.location.origin + window.location.pathname;
                const linkDesafio = `${baseUrl}?match=${matchId}`;
                
                document.getElementById('share-link').value = linkDesafio;
                
                window.history.replaceState({}, '', `${baseUrl}?match=${matchId}&created=true`);
            } catch (e) {
                console.error("Error al guardar el partido:", e);
                const linkLocal = `MATCH_${Date.now()}_${Math.random().toString(36).substr(2, 9)}`;
                document.getElementById('share-link').value = `${window.location.origin}?match=${linkLocal}`;
            }
        }

        function copiarEnlace() {
            const enlace = document.getElementById('share-link').value;
            navigator.clipboard.writeText(enlace);
        }

        async function simularPartido() {
            document.getElementById('screen-tactics').classList.remove('active');
            document.getElementById('screen-result').classList.add('active');

            const creadorAlineacion = alineacionesPorSlot;
            const rivalAlineacion = alineacionesPorSlot;

            let eventos = [];
            let golCreador = 0, golRival = 0;

            for (let slot = 1; slot <= 6; slot++) {
                const minutoInicio = (slot - 1) * 15 + 1;
                const minutoFin = slot * 15;
                
                for (let m = minutoInicio; m <= minutoFin; m++) {
                    if (Math.random() < 0.15) {
                        if (Math.random() < 0.5) {
                            golCreador++;
                            eventos.push({ minuto: m, equipo: 'creador', autor: 'Gol' });
                        } else {
                            golRival++;
                            eventos.push({ minuto: m, equipo: 'rival', autor: 'Gol' });
                        }
                    }
                }
            }

            window.ultimoPartidoProcesado = { eventos, golCreador, golRival, creador: perfil.nombre, rival: 'Rival FC' };
            resolverYMostrarMarcador(window.ultimoPartidoProcesado);
        }

                <div class="vs-team-box">

                        <div class="shorts-zone" style="background: ${perfil.colorPants} !important;"></div>
                    </div>
                </div>
                <div class="vs-score-center">${golCreador} - ${golRival}</div>
                <div class="vs-team-box">
                    <div class="vs-team-name">${rival}</div>
                    <div class="player-pixel mini" style="transform:scale(2); margin:10px 0;">
                        <div class="jersey-zone" style="background: #1a8cff !important;"></div>
                        <div class="shorts-zone" style="background: #ffffff !important;"></div>
                    </div>
                </div>
            `;
            
            document.getElementById('marcador-dinamico-equipos').innerHTML = marcadorHTML;
            
            const listaResultados = document.getElementById('resultado-lista');

            if (eventos.length === 0) {

                listaResultados.appendChild(empate);
            } else {
                eventos.forEach(ev => {
                    const li = document.createElement('li');
                    const nombreEquipo = ev.equipo === 'creador' ? creador : rival;
                    const textoGol = diccionario[idioma].txtGol
                        .replace('{m}', ev.minuto)
                        .replace('{equipo}', nombreEquipo);

                document.getElementById('panel-retorno-rival').style.display = 'none';
            }

        function copiarEnlaceRetorno() {
            const enlace = document.getElementById('share-back-link').value;
            navigator.clipboard.writeText(enlace).then(() => {
                alert(diccionario[idioma].copiado);
            });
        }

        async function cargarYMostrarResultadoFinal() {
            try {
                const { data, error } = await supabaseClient
                    .from('matches')
                    .select('*')
                    .eq('id', partidoId)
                    .single();

                if (error) throw error;

                const party = data;
                const resultado = JSON.parse(party.resultado || '{}');
                
                window.ultimoPartidoProcesado = {
                    eventos: resultado.eventos || [],
                    golCreador: resultado.golCreador || 0,
                    golRival: resultado.golRival || 0,
                    creador: party.creador,
                    rival: party.rival_name || 'Rival FC'
                };

                resolverYMostrarMarcador(window.ultimoPartidoProcesado);
            } catch (e) {
                console.error("Error al cargar resultado:", e);
            }
        }

        function irAInicio() {
            window.location.href = window.location.origin + window.location.pathname;
        }
    </script>
</body>
</html>
